name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消重复运行（同一 PR 重新 push 时）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Mypy
        run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Pin Python ${{ matrix.python-version }}
        run: uv python pin ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Run pytest
        run: uv run pytest --cov=src/amarket --cov-report=xml --cov-report=term-missing -m "not integration and not e2e"
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # 文档/spec markdown 检查（轻量，不阻塞）
  docs-check:
    name: Docs sanity
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          for f in README.md CLAUDE.md CONTRIBUTING.md CHANGELOG.md docs/PROJECT_STATE.md; do
            test -f "$f" || { echo "::error::Missing required doc: $f"; exit 1; }
          done
      - name: Warn on TODO占位 in CODEOWNERS
        run: |
          if grep -q "TODO" .github/CODEOWNERS; then
            echo "::warning::.github/CODEOWNERS 仍有 TODO 占位符（小组成员账号待填）"
          fi
