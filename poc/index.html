<!DOCTYPE html>
<html lang="zh-CN" data-theme="okx">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amarket — Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap">

  <!-- Tailwind (POC 用 CDN；M3b 可换预编译) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 项目 theme CSS -->
  <link rel="stylesheet" href="assets/css/theme-okx.css">

  <!-- Alpine.js & ECharts -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- 项目 JS -->
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/pages/index.js"></script>
</head>
<body>

  <!-- 顶部 nav 注入点 -->
  <div id="topbar-mount"></div>

  <main class="page-shell" x-data="indexPage()" x-init="init()">

    <!-- 全局 error banner 由 shared.js showBanner() 注入 -->

    <!-- Macro 顶条（KPI 横条）-->
    <div class="macro-bar">
      <div class="mb-stat">
        <div class="mb-label">总新闻</div>
        <div class="mb-value" x-text="news.length"></div>
      </div>
      <div class="mb-stat">
        <div class="mb-label">告警 P0/P1</div>
        <div class="mb-value text-down" x-text="importantAlerts.length"></div>
      </div>
      <div class="mb-stat">
        <div class="mb-label">板块上涨</div>
        <div class="mb-value text-up" x-text="sectorsUp + ' / ' + (topSectors.length || 14)"></div>
      </div>
      <div class="mb-stat">
        <div class="mb-label">数据时间</div>
        <div class="mb-value" style="font-size:14px" x-text="dataTime"></div>
      </div>
    </div>

    <!-- ① 市场状态栏（Hero 大数字卡片）-->
    <section class="mb-6">
      <div class="card-title with-accent">市场行情</div>
      <div class="market-strip">
        <template x-for="idx in marketStatus.indexes" :key="idx.code">
          <div class="market-card">
            <div class="mc-name" x-text="idx.name"></div>
            <div class="mc-price" :class="fmt.pctClass(idx.change_pct)" x-text="fmt.num(idx.price)"></div>
            <div class="mc-change">
              <span class="pill" :class="(idx.change_pct ?? 0) >= 0 ? 'pill-up' : 'pill-down'" x-text="fmt.pctText(idx.change_pct)"></span>
            </div>
          </div>
        </template>
        <div x-show="!marketStatus.indexes.length" class="text-muted p-4">暂无行情数据 · 跑 <code>uv run amarket collect market</code></div>
      </div>
    </section>

    <!-- ② 今日核心结论 -->
    <section class="card card-elevated mb-6">
      <div class="card-title with-accent">今日核心结论</div>
      <p style="font-size:15px;line-height:1.7;margin:0" x-text="data.today_conclusion || '（M4 接盘前日报后填充 — 当前为占位）'"></p>
    </section>

    <!-- ③ 实时新闻流 (左 7/12) ＋ ④/⑤/⑥/⑦/⑧ (右 5/12) -->
    <div class="grid-cols-12">

      <section class="col-span-7 card">
        <div class="card-title with-accent flex justify-between items-center">
          <span>实时新闻流</span>
          <span class="text-muted" style="font-size:11px" x-text="`共 ${filteredNews.length} 条`"></span>
        </div>
        <!-- 筛选 -->
        <div class="flex gap-2 mb-4" style="flex-wrap:wrap">
          <select x-model="filter.category">
            <option value="">全部分类</option>
            <template x-for="c in categories" :key="c">
              <option :value="c" x-text="c"></option>
            </template>
          </select>
          <select x-model="filter.sentiment">
            <option value="">全部情绪</option>
            <option value="强利多">强利多</option>
            <option value="利多">利多</option>
            <option value="中性">中性</option>
            <option value="利空">利空</option>
            <option value="强利空">强利空</option>
          </select>
          <select x-model.number="filter.minImportance">
            <option :value="0">所有重要性</option>
            <option :value="3">≥ 3 ★</option>
            <option :value="4">≥ 4 ★</option>
            <option :value="5">= 5 ★</option>
          </select>
          <button @click="resetFilter()" class="btn">清空</button>
        </div>
        <!-- 新闻列表 -->
        <div class="scroll-area">
          <template x-for="item in filteredNews.slice(0, 30)" :key="item.news_id">
            <a :href="`news-detail.html?id=${item.news_id}`" class="news-row">
              <div class="nr-meta">
                <span class="num" x-text="fmt.timeAgo(item.published_at)"></span>
                <div class="flex gap-2 items-center">
                  <span x-show="item.alert_level" :class="fmt.alertClass(item.alert_level)" x-text="item.alert_level"></span>
                  <span x-text="item.source"></span>
                </div>
              </div>
              <div class="nr-title" x-text="item.title"></div>
              <div class="nr-tags">
                <span class="tag" x-show="item.primary_category" x-text="item.primary_category"></span>
                <span class="stars" x-show="item.importance" x-text="fmt.stars(item.importance)"></span>
                <span x-show="item.sentiment" :class="fmt.sentClass(item.sentiment)" x-text="item.sentiment"></span>
              </div>
            </a>
          </template>
          <div x-show="!filteredNews.length" class="p-4 text-muted">暂无符合筛选的新闻</div>
        </div>
      </section>

      <div class="col-span-5 flex flex-col gap-4">

        <!-- ④ P0/P1 重要新闻卡 -->
        <section class="card">
          <div class="card-title with-accent">P0 / P1 重要新闻</div>
          <div>
            <template x-for="alert in importantAlerts.slice(0, 5)" :key="alert.alert_id">
              <a :href="`news-detail.html?id=${alert.news_id}`" class="alert-card" :class="`lvl-${alert.level.toLowerCase()}`">
                <div class="ac-head">
                  <span :class="fmt.alertClass(alert.level)" x-text="alert.level"></span>
                  <span class="num text-muted" style="font-size:11px" x-text="fmt.timeAgo(alert.created_at)"></span>
                </div>
                <div class="ac-title" x-text="alert.news_title || '(无标题)'"></div>
                <div class="ac-meta" x-text="alert.trigger_reason"></div>
              </a>
            </template>
            <div x-show="!importantAlerts.length" class="text-muted">当前无 P0/P1 告警</div>
          </div>
        </section>

        <!-- ⑤ 板块热力图 -->
        <section class="card">
          <div class="card-title with-accent">板块热力图</div>
          <div id="sector-heatmap" style="width:100%;height:300px"></div>
          <div class="text-muted mt-2 flex justify-between items-center" style="font-size:11px">
            <span>14 板块 · 颜色按涨跌幅</span>
            <a href="sectors.html">完整版 →</a>
          </div>
        </section>

        <!-- ⑥ 新闻影响板块榜 -->
        <section class="card">
          <div class="card-title with-accent">板块榜（新闻热度）</div>
          <table class="data-grid">
            <thead><tr><th>板块</th><th style="text-align:right">新闻</th><th style="text-align:right">涨跌</th></tr></thead>
            <tbody>
              <template x-for="sec in topSectors.slice(0,8)" :key="sec.name">
                <tr>
                  <td style="font-weight:500" x-text="sec.name"></td>
                  <td style="text-align:right" class="num" x-text="sec.news_count_24h"></td>
                  <td style="text-align:right">
                    <span class="pill" :class="sec.change_pct >= 0 ? 'pill-up' : 'pill-down'" x-text="fmt.pctText(sec.change_pct)"></span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </section>

        <!-- ⑦ 个股异动榜（M3b 接） -->
        <section class="card">
          <div class="card-title with-accent">个股异动榜</div>
          <div class="text-muted p-3" style="text-align:center;font-size:13px">
            <div style="font-size:32px;margin-bottom:8px">📊</div>
            M3b 接入 <code>/api/dashboard/movers</code>
          </div>
        </section>

        <!-- ⑧ 突发告警时间线 -->
        <section class="card">
          <div class="card-title with-accent">突发告警时间线</div>
          <div class="flex flex-col" style="max-height:300px;overflow-y:auto;gap:2px">
            <template x-for="alert in allAlerts.slice(0, 12)" :key="alert.alert_id">
              <div class="flex gap-3 items-center" style="padding:10px 4px;border-bottom:1px solid var(--border-default)">
                <span :class="fmt.alertClass(alert.level)" x-text="alert.level"></span>
                <span class="num text-muted" style="font-size:12px;min-width:50px" x-text="fmt.time(alert.created_at)"></span>
                <a :href="`news-detail.html?id=${alert.news_id}`" style="flex:1;font-size:13px" x-text="alert.news_title || alert.trigger_reason"></a>
              </div>
            </template>
            <div x-show="!allAlerts.length" class="text-muted p-3">无告警</div>
          </div>
        </section>

      </div>
    </div>

    <!-- ⑨ 日报入口 -->
    <section class="mt-6">
      <div class="card-title with-accent">6 时段日报</div>
      <div class="grid-cols-12" style="gap:12px">
        <template x-for="kind in ['premarket','morning','noon','afternoon','close','evening']" :key="kind">
          <a :href="`reports.html?kind=${kind}`" class="col-span-4 card"
             :style="reports[kind] ? 'border-color:var(--border-accent);box-shadow:0 0 0 1px var(--accent-glow)' : 'opacity:0.45'">
            <div class="flex justify-between items-center mb-2">
              <span style="font-size:13px;font-weight:600" x-text="kindLabels[kind]"></span>
              <span x-text="reports[kind] ? '✓' : '—'" :style="reports[kind] ? 'color:var(--up)' : 'color:var(--text-muted)'"></span>
            </div>
            <div class="text-muted" style="font-size:11px" x-text="reports[kind] ? '已生成（mock）' : '等待 M4 调度'"></div>
          </a>
        </template>
      </div>
    </section>

  </main>

</body>
</html>
