# Alembic configuration - Project_Amarket
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Migration scripts directory (relative to project root)
script_location = src/amarket/db/migrations

# Migration filename template
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Migration timezone
timezone = UTC

# Max characters in slug
truncate_slug_length = 40

# sqlalchemy.url is injected dynamically in env.py via amarket.services.config_service
# Leave empty here, do not hardcode.
sqlalchemy.url =

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
