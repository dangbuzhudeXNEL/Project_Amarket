# 板块映射表 — Spec v3 §8.2（PRD §5.2 启发，可热扩）
#
# 用于 M2 NewsClassifier：从新闻标题/正文里识别"影响哪些板块"
#
# 设计：
# - 每个板块定义 keywords（命中即关联）和 representative_stocks（代表个股，用于看板展示）
# - 一条新闻可关联多个板块（multi-tag）
# - 板块名跟 PRD §5.2 + 业界通用叫法对齐，便于跟券商研报 / 同花顺概念板块映射

sectors:
  # ============ 科技 / AI 链 ============
  - name: "AI算力"
    keywords: ["AI算力", "算力", "AI芯片", "GPU", "训练芯片", "推理芯片", "大模型训练", "数据中心"]
    representative_stocks: ["寒武纪", "中科曙光", "浪潮信息", "海光信息"]

  - name: "半导体"
    keywords: ["半导体", "芯片", "晶圆", "光刻", "EDA", "封测", "存储芯片", "DRAM", "NAND", "光刻机"]
    representative_stocks: ["中芯国际", "韦尔股份", "兆易创新", "北方华创"]

  - name: "CPO"
    keywords: ["CPO", "光模块", "硅光", "共封装光学"]
    representative_stocks: ["中际旭创", "新易盛", "天孚通信"]

  - name: "PCB"
    keywords: ["PCB", "印制电路板", "覆铜板", "HDI"]
    representative_stocks: ["沪电股份", "深南电路", "鹏鼎控股"]

  # ============ 新能源 / 双碳 ============
  - name: "新能源车"
    keywords: ["新能源车", "电动车", "电动汽车", "新能源汽车", "造车新势力", "比亚迪", "蔚来", "理想", "小鹏"]
    representative_stocks: ["比亚迪", "宁德时代", "长城汽车", "广汽集团"]

  - name: "光伏储能"
    keywords: ["光伏", "储能", "硅料", "硅片", "电池片", "组件", "逆变器", "锂电池", "钠电池"]
    representative_stocks: ["阳光电源", "宁德时代", "隆基绿能", "通威股份"]

  # ============ 医药 / 消费 ============
  - name: "创新药"
    keywords: ["创新药", "生物药", "ADC", "GLP-1", "mRNA", "CGT", "PD-1", "靶向药"]
    representative_stocks: ["恒瑞医药", "百济神州", "信达生物", "君实生物"]

  - name: "消费"
    keywords: ["白酒", "啤酒", "乳制品", "免税", "化妆品", "餐饮", "调味品", "茅台", "五粮液"]
    representative_stocks: ["贵州茅台", "五粮液", "海天味业", "伊利股份"]

  # ============ 金融地产 ============
  - name: "券商"
    keywords: ["券商", "证券公司", "投行", "经纪", "两融", "财富管理", "中信证券", "中金", "国君"]
    representative_stocks: ["中信证券", "华泰证券", "东方财富", "国泰君安"]

  - name: "地产链"
    keywords: ["地产", "房地产", "房企", "保障房", "城投", "土拍", "限购", "竣工", "建材"]
    representative_stocks: ["保利发展", "万科A", "招商蛇口", "海螺水泥"]

  - name: "红利高股息"
    keywords: ["高股息", "红利", "分红", "股息率", "煤炭", "电力", "运营商"]
    representative_stocks: ["长江电力", "中国移动", "中国神华", "工商银行"]

  # ============ 军工 / 周期 / 出海 ============
  - name: "军工"
    keywords: ["军工", "国防", "战机", "导弹", "舰船", "卫星", "军贸", "军费"]
    representative_stocks: ["中航沈飞", "中航光电", "航发动力"]

  - name: "低空经济"
    keywords: ["低空经济", "eVTOL", "无人机", "通航", "飞行汽车"]
    representative_stocks: ["中信海直", "亿航智能"]

  - name: "有色金属"
    keywords: ["有色", "铜", "黄金", "铝", "锂", "镍", "钨", "稀土"]
    representative_stocks: ["紫金矿业", "洛阳钼业", "山东黄金", "赣锋锂业"]

  - name: "出海链"
    keywords: ["出海", "海外业务", "一带一路", "海运", "造船", "集装箱"]
    representative_stocks: ["中远海控", "中国船舶", "三花智控"]

# === 元配置 ===
config:
  # 一条新闻最多关联几个板块（避免过度 tagging）
  max_sectors_per_news: 5
  # 板块匹配的最小关键词命中数（1 表示命中 1 个 keyword 就关联）
  min_keyword_hits: 1
