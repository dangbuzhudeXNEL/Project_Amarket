# 应用全局配置 — Spec v3 §12.2
# 凡涉及密钥 / webhook URL 的，**只写 env var 名**，实际值放 .env

app:
  name: amarket
  env: dev                # dev | test | prod
  timezone: Asia/Shanghai
  log_level: INFO
  data_dir: ./data
  database_url: sqlite:///./data/amarket.db

api:
  host: 127.0.0.1
  port: 8080
  cors_origins:
    - http://127.0.0.1:8000
    - http://127.0.0.1:8501
    - http://localhost:8000
    - http://localhost:8501

ui:
  streamlit_port: 8501
  poc_port: 8000

# Phase / Milestone 元信息（仅用于 /healthz 显示）
project_meta:
  spec_version: v3.0
  current_phase: Phase1
  current_milestone: M1
