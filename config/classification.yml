# 一级分类规则 — Spec v3 §8.1（PRD §5.1, 8 类）
#
# NewsClassifier 用规则匹配新闻 → 一级分类（multi-label，可同时多类）
# 规则按 priority 排序（数字小优先），先匹配先选
# fallback: 任何规则都不命中 → "其他"
#
# 一条新闻可命中多个 category，最终 primary_category 取 priority 最低的那个

categories:
  # ==================================================
  # 1. 宏观政策（最高优先级，影响整体市场）
  # ==================================================
  - name: "宏观政策"
    priority: 1
    rules:
      - any_keyword: ["央行", "证监会", "国务院", "财政部", "发改委", "金融监管总局",
                      "降准", "降息", "加息", "LPR", "MLF", "公开市场操作",
                      "美联储", "FOMC", "鲍威尔", "CPI", "PCE", "PPI", "非农",
                      "印花税", "印花费", "T+0", "T+1"]

  # ==================================================
  # 2. 风险事件（重大利空 / 黑天鹅）
  # ==================================================
  - name: "风险事件"
    priority: 2
    rules:
      - any_keyword: ["黑天鹅", "战争", "制裁", "禁运", "暴雷", "破产", "违约",
                      "立案", "处罚", "调查", "财务造假", "退市风险",
                      "地震", "灾害", "事故"]

  # ==================================================
  # 3. 公司公告（业绩 / 重要决策）
  # ==================================================
  - name: "公司公告"
    priority: 3
    rules:
      - any_keyword: ["业绩预告", "年报", "中报", "季报", "业绩预增", "业绩预亏",
                      "定增", "增发", "并购", "重组", "回购", "减持", "增持",
                      "停牌", "复牌", "ST", "退市",
                      "高管", "辞职", "辞任", "聘任"]

  # ==================================================
  # 4. 资金流（北向 / ETF / 两融）
  # ==================================================
  - name: "资金流"
    priority: 4
    rules:
      - any_keyword: ["北向", "南向", "陆股通", "港股通", "外资",
                      "ETF流入", "ETF流出", "ETF申赎", "ETF异动",
                      "两融", "融资余额", "融资买入", "融券",
                      "龙虎榜", "机构席位", "游资", "席位"]

  # ==================================================
  # 5. 海外映射（美股 / 港股 / 大宗）
  # ==================================================
  - name: "海外映射"
    priority: 5
    rules:
      - any_keyword: ["美股", "纳指", "标普", "道指", "罗素",
                      "英伟达", "微软", "苹果", "谷歌", "Meta", "AMD", "台积电",
                      "港股", "恒指", "恒生科技",
                      "中概", "阿里", "京东", "拼多多",
                      "日经", "韩股", "KOSPI",
                      "VIX", "美债", "美元指数", "DXY"]

  # ==================================================
  # 6. 大宗商品
  # ==================================================
  - name: "大宗商品"
    priority: 6
    rules:
      - any_keyword: ["原油", "石油", "WTI", "布伦特", "OPEC",
                      "黄金", "白银", "金价",
                      "铜", "铝", "铁矿石", "煤炭", "天然气",
                      "农产品", "大豆", "玉米"]

  # ==================================================
  # 7. 市场行情（指数 / 板块 / 涨跌停）
  # ==================================================
  - name: "市场行情"
    priority: 7
    rules:
      - any_keyword: ["上证", "深证", "创业板指", "科创50", "北证50", "沪深300", "上证50",
                      "成交额", "成交量", "涨停", "跌停", "涨停潮", "跌停潮",
                      "异动", "拉升", "跳水", "板块轮动"]

  # ==================================================
  # 8. 交易提示（解禁 / 分红 / 申购等）
  # ==================================================
  - name: "交易提示"
    priority: 8
    rules:
      - any_keyword: ["解禁", "限售", "分红派息", "派息", "送股", "转股",
                      "可转债", "申购", "中签", "新股", "IPO",
                      "停牌核查", "复牌交易"]

# === 元配置 ===
config:
  # 没匹配任何 category 时的兜底
  fallback_category: "市场行情"
  # 是否允许多分类（True = 一条新闻可多 category；False = 仅取 priority 最低）
  multi_label: true
  # 多分类时上限
  max_categories: 3
